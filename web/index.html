<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mine Map Demo (Leaflet + Image + GeoJSON)</title>

    <!--
      Leaflet (no frameworks).
      We use Leaflet's "Simple CRS" so our coordinates are just plain 2D numbers,
      not real-world lat/lng.
    -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Nice-to-have: Leaflet Draw (lets users draw new features in the browser). -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__title">Mine map demo</div>
      <div class="topbar__actions">
        <button id="exportGeoJsonBtn" type="button" title="Export drawn features">
          Export drawn → GeoJSON
        </button>
      </div>
    </header>

    <!-- Leaflet requires a fixed-size container. -->
    <div id="map" aria-label="Mine map"></div>

    <footer class="footer">
      <div>
        Coordinates are in image units (0–1000). Replace
        <code>../base/mine_map.jpg</code> with your own JPG.
      </div>
    </footer>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="./map.js"></script>
  </body>
</html>
